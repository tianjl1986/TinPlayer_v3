name: TinPlayer Ultimate Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          
          # 0. 清理
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive
          
          echo "🚀 Starting build..."
          # 1. 编译
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          echo "📦 Assembling App bundle..."
          mkdir -p Payload/TinPlayer.app
          
          # 2. 提取二进制
          BINARY_PATH=$(find ./TinPlayer.xcarchive/Products -type f -perm +111 ! -name "*.plist" ! -name "*.sh" | head -n 1)
          cp "$BINARY_PATH" Payload/TinPlayer.app/TinPlayer
          chmod +x Payload/TinPlayer.app/TinPlayer
          
          # 3. 🚀 【地毯式搜索资源】
          echo "🔍 Brute-force searching for resources..."
          
          # 找所有的 Assets.car
          find . -name "Assets.car" -exec cp -v {} Payload/TinPlayer.app/ \; || true
          
          # 找所有的 .bundle 文件夹 (Swift Package 资源通常在这里)
          # 我们把 bundle 里的内容直接倒出来
          find . -name "*.bundle" -type d -exec cp -rv {}/. Payload/TinPlayer.app/ \; || true
          
          # 找所有的本地化文件
          find . -name "*.lproj" -type d -exec cp -rv {} Payload/TinPlayer.app/ \; || true

          # 4. 生成 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>12</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
          </dict>
          </plist>
          EOF
          
          # 5. 打包
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Final IPA Created"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-brute-${{ github.run_number }}"
          name: "Tin Player Brute Build #${{ github.run_number }}"
          body: "🔥 暴力资源抓取版。请检查大小！"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
