name: TinPlayer Final Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 寻找源码目录并进入
          SRC_PATH=$(find . -name "Sources" -type d | head -n 1)
          cd $(dirname "$SRC_PATH")

          # 2. 生成配置 (Executable)
          cat <<EOF > Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v17)],
              products: [.executable(name: "TinPlayer", targets: ["AppModule"])],
              targets: [.executableTarget(name: "AppModule", path: "Sources")]
          )
          EOF

          # 3. 编译
          xcodebuild archive -scheme "TinPlayer" -destination "generic/platform=iOS" -archivePath ./TinPlayer.xcarchive CODE_SIGNING_ALLOWED=NO

          # 4. 手动组装 (关键：从命令行路径提取已链接的二进制)
          echo "📦 Assembling App bundle..."
          mkdir -p TinPlayer.app
          
          # 定位真正的二进制程序 (在 InstallationBuildProductsLocation 下)
          BINARY=$(find /Users/runner/Library/Developer/Xcode/DerivedData -path "*/usr/local/bin/TinPlayer" -type f | head -n 1)
          echo "Found Binary: $BINARY"
          cp "$BINARY" TinPlayer.app/TinPlayer
          chmod +x TinPlayer.app/TinPlayer

          # 定位编译出的资源文件 Assets.car
          ASSETS=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "Assets.car" -type f | head -n 1)
          echo "Found Assets: $ASSETS"
          cp "$ASSETS" TinPlayer.app/

          # 5. 生成 Info.plist (包含 14 Pro 全屏适配)
          cat <<EOF > TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.5.4</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>UILaunchScreen</key><dict/>
              <key>NSAppleMusicUsageDescription</key><string>需要访问音乐库。</string>
          </dict>
          </plist>
          EOF

          # 6. 打包 IPA
          mkdir -p Payload
          cp -r TinPlayer.app Payload/
          zip -r "$GITHUB_WORKSPACE/TinPlayer.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.5.4"
          name: "Tin Player Final Fix"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
