name: TinPlayer Path Audit Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Audit
        run: |
          set -e
          # 1. 先打印所有的构建设置，这样我能看到它到底把文件存哪了
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -showBuildSettings > build_settings.txt
          
          echo "📋 提取出的关键路径:"
          grep "BUILT_PRODUCTS_DIR" build_settings.txt || true
          grep "EXECUTABLE_PATH" build_settings.txt || true

          # 2. 正式构建
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Ultimate Assembly
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app

          echo "🚀 正在全盘搜救代码本体..."
          
          # 这次我直接根据体积来找！只要是大于 1MB 且是可执行权限的文件，统统抓过来
          # 我们先找 Products 目录
          REAL_FILE=$(find ./DerivedData/Build/Products -type f -perm +111 -size +1M ! -name "*.plist" | head -n 1)
          
          if [ -z "$REAL_FILE" ]; then
             echo "⚠️ Products 没找到，扩大范围搜寻整个 DerivedData..."
             REAL_FILE=$(find ./DerivedData -type f -perm +111 -size +1M ! -path "*/.git/*" | head -n 1)
          fi

          if [ -n "$REAL_FILE" ]; then
             echo "🎯 终于抓到了: $REAL_FILE"
             echo "📊 体积: $(du -sh "$REAL_FILE")"
             cp -L "$REAL_FILE" Payload/TinPlayer.app/TinPlayer
             chmod +x Payload/TinPlayer.app/TinPlayer
          else
             echo "❌ 彻底绝望：编译器好像什么都没产出！"
             find ./DerivedData -maxdepth 4
             exit 1
          fi

          # 注入 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>34</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>NSAppleMusicUsageDescription</key><string>我们需要访问您的媒体库以进行扫描和播放。</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
          </dict>
          </plist>
          EOF

          # 搜刮资源
          find ./DerivedData -name "Assets.car" -exec cp {} Payload/TinPlayer.app/ \; 2>/dev/null || true

          # 打包
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终结论 - IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Audit
          path: TinPlayer.ipa
