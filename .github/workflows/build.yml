ame: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Show Archive Contents
        run: |
          echo "=== Archive 目录结构 ==="
          find ./TinPlayer.xcarchive -type d | head -40
          echo ""
          echo "=== 所有 .app 包 ==="
          find ./TinPlayer.xcarchive -name "*.app" -type d

      - name: Export IPA
        run: |
          # 查找完整的 .app 目录
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          echo "找到 .app 路径: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 错误：找不到 .app 目录，显示 archive 全部内容："
            find ./TinPlayer.xcarchive
            exit 1
          fi
          
          # 验证 .app 里有可执行文件
          echo "=== .app 内容 ==="
          ls -la "$APP_PATH"
          
          # 打包成 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          
          APP_NAME=$(basename "$APP_PATH")
          echo "打包 $APP_NAME 成 IPA..."
          zip -qr TinPlayer.ipa Payload
          
          # 验证 IPA 大小
          echo "=== IPA 文件大小 ==="
          ls -lh TinPlayer.ipa
          
          # 显示 IPA 内容（前20行）
          echo "=== IPA 内容预览 ==="
          unzip -l TinPlayer.ipa | head -20

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-IPA
          path: TinPlayer.ipa
