name: TinPlayer Fix Crash & 14Pro

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 寻找源码目录并进入
          SRC_PATH=$(find . -name "Sources" -type d | head -n 1)
          cd $(dirname "$SRC_PATH")

          # 2. 生成正确的 Package.swift (必须是 executable 才能运行)
          echo "🧱 Generating Executable Config..."
          cat <<EOF > Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v17)],
              products: [.executable(name: "TinPlayer", targets: ["AppModule"])],
              targets: [.executableTarget(name: "AppModule", path: "Sources")]
          )
          EOF

          # 3. 编译 Archive
          echo "🚀 Starting build..."
          xcodebuild archive -scheme "TinPlayer" -destination "generic/platform=iOS" -archivePath ./TinPlayer.xcarchive CODE_SIGNING_ALLOWED=NO

          # 4. 提取生成的 .app 包 (Xcode 会自动生成完整的结构)
          echo "📦 Extracting .app bundle..."
          mkdir -p Payload
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          
          APP_NAME=$(basename "$APP_PATH")

          # 5. 注入 14 Pro 适配 (在自动生成的 Info.plist 基础上添加)
          echo "📱 Fixing Resolution for 14 Pro..."
          /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "Payload/$APP_NAME/Info.plist" || true
          # 确保 Bundle ID 一致
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.skeuo.tinplayer" "Payload/$APP_NAME/Info.plist"

          # 6. 打包 IPA
          zip -r "$GITHUB_WORKSPACE/TinPlayer.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.5.3"
          name: "Tin Player Fixed (No Crash)"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
