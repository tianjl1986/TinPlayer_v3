      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app

          echo "📦 正在锁定真正的 Products 产物目录..."
          
          # 1. 精准定位 Products 下的 Release-iphoneos
          PRODUCT_DIR=$(find ./DerivedData/Build/Products -name "Release-iphoneos" -type d | head -n 1)
          
          if [ -z "$PRODUCT_DIR" ]; then
             echo "⚠️ 未在标准路径发现产物，尝试全局搜索..."
             PRODUCT_DIR=$(find ./DerivedData -path "*/Build/Products/Release-iphoneos" -type d | head -n 1)
          fi

          echo "✅ 锁定产物目录: $PRODUCT_DIR"
          
          # 2. 拷贝所有产物
          cp -R "$PRODUCT_DIR/" Payload/TinPlayer.app/
          
          # 3. 寻找真正的二进制文件
          # 在 SwiftPM 项目中，主程序可能被命名为 "TinPlayer" 或 "AppModule"
          echo "🔍 正在寻找主执行文件..."
          # 寻找该目录下体积最大且没有后缀的文件
          REAL_EXECUTABLE=$(find Payload/TinPlayer.app -maxdepth 1 -type f ! -name "*.*" | xargs du -s | sort -rn | head -n 1 | awk '{print $2}')
          
          if [ -n "$REAL_EXECUTABLE" ]; then
             echo "✅ 找到主程序: $REAL_EXECUTABLE"
             mv "$REAL_EXECUTABLE" Payload/TinPlayer.app/TinPlayer
          else
             echo "❌ 失败: 目录下没有可执行文件！"
             ls -R Payload/TinPlayer.app
             exit 1
          fi
          
          chmod +x Payload/TinPlayer.app/TinPlayer
          
          # 4. 注入 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>24</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer(1)></integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>LSSupportsOpeningDocumentsInPlace</key><true/>
              <key>NSAppleMusicUsageDescription</key>
              <string>我们需要访问您的媒体库以扫描和播放本地音乐。</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
          </dict>
          </plist>
          EOF

          # 5. 封装
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终 IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Success
          path: TinPlayer.ipa

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-success"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
