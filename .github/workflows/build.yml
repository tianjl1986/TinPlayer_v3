name: TinPlayer Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Path
        run: |
          echo "=== 检查项目文件 ==="
          ls -R
          # 查找 Package.swift 并进入其目录
          PROJ_DIR=$(find . -name "Package.swift" -exec dirname {} \; | head -n 1)
          echo "PROJECT_DIR=$PROJ_DIR" >> $GITHUB_ENV

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build App
        run: |
          cd ${{ env.PROJECT_DIR }}
          # 使用 build 替代 archive，这对 SPM 项目更友好
          xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath ./build_data \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd ${{ env.PROJECT_DIR }}
          # 找到编译出来的 .app 文件夹
          APP_PATH=$(find ./build_data -name "*.app" -type d | head -n 1)
          echo "找到编译产物: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 找不到编译出来的 App！"
            exit 1
          fi
          
          # 手动构建 IPA 结构
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr TinPlayer.ipa Payload
          
          # 移动到根目录
          mv TinPlayer.ipa $GITHUB_WORKSPACE/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-IPA
          path: "*.ipa"
