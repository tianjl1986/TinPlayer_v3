name: TinPlayer Ultimate Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 定位项目目录
          TARGET_DIR=$(find . -name "Sources" -type d -exec dirname {} \; | head -n 1)
          echo "Target directory: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # 2. 生成项目配置文件
          echo "// swift-tools-version: 5.9" > Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "import AppleProductTypes" >> Package.swift
          echo "let package = Package(name: \"TinPlayer\", platforms: [.iOS(.v17)], products: [.iOSApplication(name: \"TinPlayer\", targets: [\"AppModule\"], bundleIdentifier: \"com.skeuo.tinplayer\", displayVersion: \"1.3.0\", bundleVersion: \"12\", appIcon: .asset(\"AppIcon\"), accentColor: .presetColor(.indigo), supportedDeviceFamilies: [.phone], supportedInterfaceOrientations: [.portrait], capabilities: [.mediaLibrary(purposeString: \"Music\"), .outgoingNetworkConnections()])], targets: [.executableTarget(name: \"AppModule\", path: \"Sources\")])" >> Package.swift

          # 3. Archive 编译
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          # 4. 强力寻找编译出的 .app 文件夹
          echo "🔍 正在寻找编译产物..."
          
          # 尝试在所有可能的位置寻找 .app
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          
          # 如果没找到 .app，但有二进制文件，则尝试查看结构
          if [ -z "$APP_PATH" ]; then
            echo "⚠️ 未直接找到 .app 文件夹，查看 archive 结构："
            ls -R ./TinPlayer.xcarchive
            
            # 有时 Swift PM 会生成一个不带扩展名的目录或在特定位置
            APP_PATH=$(find ./TinPlayer.xcarchive/Products -type d -depth 2 | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ 还是找不到编译产物，尝试备选路径..."
            # 最后的尝试：寻找 Products 下的任何内容
            APP_PATH=$(ls -d ./TinPlayer.xcarchive/Products/Applications/*.app 2>/dev/null || ls -d ./TinPlayer.xcarchive/Products/usr/local/bin/*.app 2>/dev/null || echo "")
          fi

          if [ -n "$APP_PATH" ]; then
            echo "✅ 成功找到产物: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r TinPlayer.ipa Payload
            mv TinPlayer.ipa "$GITHUB_WORKSPACE/"
          else
            echo "❌ 彻底找不到 .app，请检查上方的 ls -R 输出"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          body: "🎉 构建成功！如果安装后闪退，请尝试使用 AltStore 或 Sideloadly 重新签名。"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
