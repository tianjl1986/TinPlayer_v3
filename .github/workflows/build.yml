name: TinPlayer .swiftpm Recognition Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Rename and Build
        run: |
          set -e
          # 🚀 核心修复：将项目移动到 .swiftpm 结尾的文件夹
          # 只有这样，xcodebuild 才会承认它是一个 iOS App
          mkdir -p TinPlayer.swiftpm
          cp -R ./* TinPlayer.swiftpm/ || true
          cd TinPlayer.swiftpm

          echo "🏗️ 正在以 .swiftpm App 模式启动构建..."
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ../TinPlayer.xcarchive \
            -derivedDataPath ../DerivedData \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Extract Real iOS App
        run: |
          set -e
          echo "📂 检查 Archive 产物..."
          # 理论上，现在产物应该出现在 Products/Applications 下了
          find ./TinPlayer.xcarchive -name "*.app" -type d
          
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
             echo "🎯 终于抓到了真正的 iOS App: $APP_PATH"
             mkdir -p Payload
             cp -R "$APP_PATH" Payload/
             
             # 自动修正 Info.plist 权限（如果缺失）
             PLIST="Payload/$(basename "$APP_PATH")/Info.plist"
             /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string '扫描本地音乐库'" "$PLIST" 2>/dev/null || true
             /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST" 2>/dev/null || true
             
             zip -q -r TinPlayer.ipa Payload
             echo "✅ 最终胜利！IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"
          else
             echo "❌ 依然不是 .app 包，检查 bin 目录..."
             ls -R ./TinPlayer.xcarchive/Products/
             exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Corrected
          path: TinPlayer.ipa
