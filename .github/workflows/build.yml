name: TinPlayer Final Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive
          
          echo "🚀 Building TinPlayer..."
          # 增加 -allowProvisioningUpdates 防止权限问题
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          echo "📦 Assembling Bundle..."
          mkdir -p Payload/TinPlayer.app
          
          # 1. 【核心修复】强力寻找真正的二进制文件
          echo "🔍 Searching for the real binary (expected size > 1MB)..."
          # 搜索大于 500KB 的文件，排除 .plist, .sh, .car 和 .xcarchive 自身
          REAL_BINARY=$(find . -type f -size +500k ! -name "*.plist" ! -name "*.sh" ! -name "*.car" ! -path "*.xcarchive*" | head -n 1)
          
          if [ -z "$REAL_BINARY" ]; then
             echo "⚠️ Not found in workspace, searching in Archive..."
             REAL_BINARY=$(find ./TinPlayer.xcarchive -type f -size +500k ! -name "*.plist" ! -name "*.sh" | head -n 1)
          fi

          if [ -n "$REAL_BINARY" ]; then
            echo "✅ Found Real Binary: $REAL_BINARY"
            cp "$REAL_BINARY" Payload/TinPlayer.app/TinPlayer
            chmod +x Payload/TinPlayer.app/TinPlayer
          else
            echo "❌ ERROR: No executable binary found! Listing files for debug:"
            find . -maxdepth 4
            exit 1
          fi
          
          # 2. 抓取资源文件
          echo "🔍 Looking for Assets..."
          ASSETS_CAR=$(find . -name "Assets.car" | head -n 1)
          if [ -n "$ASSETS_CAR" ]; then
            echo "✅ Found Assets.car: $ASSETS_CAR"
            cp "$ASSETS_CAR" Payload/TinPlayer.app/
          fi
          
          # 3. 补全 Info.plist (包含媒体访问权限和后台播放配置)
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>15</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>NSAppleMusicUsageDescription</key>
              <string>我们需要访问您的本地音乐库以进行扫描和播放。</string>
              <key>NSLocalNetworkUsageDescription</key>
              <string>我们需要访问网络以获取歌词信息。</string>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF
          
          # 4. 检查大小
          IPA_SIZE=$(du -sh Payload | cut -f1)
          echo "📊 Final Payload size: $IPA_SIZE"
          
          # 5. 压缩
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Done! IPA Created."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
