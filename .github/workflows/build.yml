name: TinPlayer Official Archive Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Archive
        run: |
          set -e
          # 使用 archive 命令，这是最正规的打包方式
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath "./TinPlayer.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload

          echo "🔍 从归档中提取 .app 包..."
          # 官方归档后的路径非常固定：Products/Applications/xxx.app
          SRC_APP=$(find ./TinPlayer.xcarchive/Products/Applications -name "*.app" -type d | head -n 1)
          
          if [ -z "$SRC_APP" ]; then
             echo "❌ 错误: 归档文件中没找到 .app 包！"
             ls -R ./TinPlayer.xcarchive
             exit 1
          fi

          echo "✅ 找到包: $SRC_APP"
          cp -R "$SRC_APP" Payload/TinPlayer.app

          # 获取二进制文件名
          REAL_EXEC_NAME=$(defaults read "$(pwd)/Payload/TinPlayer.app/Info.plist" CFBundleExecutable)
          echo "✅ 执行文件名: $REAL_EXEC_NAME"

          # 注入权限
          /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string '我们需要访问您的媒体库以播放本地音乐。'" Payload/TinPlayer.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" Payload/TinPlayer.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" Payload/TinPlayer.app/Info.plist 2>/dev/null || true
          
          chmod +x "Payload/TinPlayer.app/$REAL_EXEC_NAME"

          # 封装
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终 IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Archive
          path: TinPlayer.ipa

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-archive"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
