name: TinPlayer Final Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          
          echo "🚀 Preparing project structure..."
          # 获取原始文件夹名并清理残留文件
          ORIGINAL_FOLDER=$(basename $(pwd))
          rm -f Sources/SkeuoPlayerApp.swift
          
          # 重命名为 .swiftpm 以触发正确的构建逻辑
          cd ..
          mv "$ORIGINAL_FOLDER" TinPlayer.swiftpm
          cd TinPlayer.swiftpm
          
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive DerivedData
          
          echo "🚀 Building TinPlayer.swiftpm..."
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO
          
          echo "📦 Assembling Bundle..."
          # 直接寻找并提取 Xcode 已经完整组装好的 .app 包
          APP_BUNDLE=$(find ./DerivedData -name "TinPlayer.app" -type d | grep "InstallationBuildProductsLocation" | head -n 1)
          
          if [ -n "$APP_BUNDLE" ]; then
            echo "✅ Found Compiled App Bundle: $APP_BUNDLE"
            mkdir -p Payload
            cp -R "$APP_BUNDLE" Payload/
          else
            echo "⚠️ Compiled bundle not found in DerivedData, checking xcarchive..."
            APP_BUNDLE="./TinPlayer.xcarchive/Products/Applications/TinPlayer.app"
            if [ -d "$APP_BUNDLE" ]; then
                echo "✅ Found in xcarchive: $APP_BUNDLE"
                mkdir -p Payload
                cp -R "$APP_BUNDLE" Payload/
            else
                echo "❌ ERROR: Cannot find TinPlayer.app anywhere!"
                find . -name "*.app" -type d
                exit 1
            fi
          fi
          
          # 📝 生成包含图标关联的 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>31</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon</string>
                      </array>
                      <key>CFBundleIconName</key>
                      <string>AppIcon</string>
                  </dict>
              </dict>
              <key>NSAppleMusicUsageDescription</key>
              <string>我们需要访问您的媒体库以播放本地音乐。</string>
              <key>NSPhotoLibraryUsageDescription</key>
              <string>我们需要访问相册以保存或读取封面图片。</string>
              <key>NSLocalNetworkUsageDescription</key>
              <string>我们需要访问本地网络以获取歌词和元数据。</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
              <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array>
          </dict>
          </plist>
          EOF
          
          echo "📊 Final Payload size: $(du -sh Payload | cut -f1)"
          zip -q -r TinPlayer.ipa Payload
          
          # 🔄 还原目录名以便 Actions 清理
          cd ..
          mv TinPlayer.swiftpm "$ORIGINAL_FOLDER"
          echo "✅ Done! IPA Created."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.
