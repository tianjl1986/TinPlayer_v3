name: TinPlayer Ultimate Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          # 1. 定位项目目录
          TARGET_DIR=$(find . -name "Sources" -type d -exec dirname {} \; | head -n 1)
          echo "Target directory: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # 2. 生成项目配置文件
          cat << 'EOF' > Package.swift
// swift-tools-version: 5.9
import PackageDescription
import AppleProductTypes

let package = Package(
    name: "TinPlayer",
    platforms: [.iOS(.v17)],
    products: [
        .iOSApplication(
            name: "TinPlayer",
            targets: ["AppModule"],
            bundleIdentifier: "com.skeuo.tinplayer",
            displayVersion: "1.3.0",
            bundleVersion: "12",
            appIcon: .asset("AppIcon"),
            accentColor: .presetColor(.indigo),
            supportedDeviceFamilies: [.phone],
            supportedInterfaceOrientations: [.portrait],
            capabilities: [
                .mediaLibrary(purposeString: "Music"),
                .outgoingNetworkConnections()
            ]
        )
    ],
    targets: [
        .executableTarget(
            name: "AppModule",
            path: "Sources"
        )
    ]
)
EOF

          # 3. 执行 Archive 打包
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO

          # 4. 提取 .app 并制作 IPA
          APP_PATH=$(find ./TinPlayer.xcarchive/Products -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "✅ 成功找到 App: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r TinPlayer.ipa Payload
            mv TinPlayer.ipa "$GITHUB_WORKSPACE/"
          else
            echo "❌ 找不到编译产物"
            ls -R ./TinPlayer.xcarchive
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          body: "🎉 编译成功！请在下方 Assets 下载 TinPlayer.ipa"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
