name: TinPlayer Final Assembly

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 寻找源码目录
          SRC_PATH=$(find . -name "Sources" -type d | head -n 1)
          cd $(dirname "$SRC_PATH")

          # 2. 生成配置
          cat <<EOF > Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v17)],
              products: [.executable(name: "TinPlayer", targets: ["AppModule"])],
              targets: [.executableTarget(name: "AppModule", path: "Sources")]
          )
          EOF

          # 3. 编译
          xcodebuild archive -scheme "TinPlayer" -destination "generic/platform=iOS" -archivePath ./TinPlayer.xcarchive CODE_SIGNING_ALLOWED=NO

          # 4. 手动组装 (改用更强的搜索模式)
          echo "📦 Assembling App bundle..."
          mkdir -p TinPlayer.app
          
          # 在 DerivedData 目录下寻找名为 TinPlayer 的可执行文件
          # 排除 plist 和其他干扰项，直奔 usr/local/bin 产物
          BINARY=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "TinPlayer" -type f | grep "usr/local/bin" | head -n 1)
          
          # 如果上面没找到，尝试万能搜索
          if [ -z "$BINARY" ]; then
            echo "⚠️ Fallback binary search..."
            BINARY=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "TinPlayer" -type f -perm +111 | head -n 1)
          fi

          echo "Found Binary: $BINARY"
          cp "$BINARY" TinPlayer.app/TinPlayer
          chmod +x TinPlayer.app/TinPlayer

          # 寻找并拷贝编译好的 UI 资源
          ASSETS=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "Assets.car" -type f | head -n 1)
          echo "Found Assets: $ASSETS"
          cp "$ASSETS" TinPlayer.app/

          # 5. 生成 Info.plist (iPhone 14 Pro 适配)
          cat <<EOF > TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.5.5</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>UILaunchScreen</key><dict/>
              <key>NSAppleMusicUsageDescription</key><string>需要访问音乐库。</string>
          </dict>
          </plist>
          EOF

          # 6. 打包 IPA
          mkdir -p Payload
          cp -r TinPlayer.app Payload/
          zip -r "$GITHUB_WORKSPACE/TinPlayer.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.5.5"
          name: "Tin Player Final Assembly"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
