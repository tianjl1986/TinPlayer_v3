name: TinPlayer 14Pro Version

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 寻找项目路径
          SRC_PATH=$(find . -name "Sources" -type d | head -n 1)
          TARGET_DIR=$(dirname "$SRC_PATH")
          cd "$TARGET_DIR"

          # 2. 生成 Package.swift
          echo "🧱 Generating Package Config..."
          cat <<EOF > Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v17)],
              products: [.library(name: "AppModule", targets: ["AppModule"])],
              targets: [.target(name: "AppModule", path: "Sources")]
          )
          EOF

          # 3. 编译 (ARCHIVE)
          echo "🚀 Starting build..."
          xcodebuild archive -scheme "TinPlayer" -destination "generic/platform=iOS" -archivePath ./TinPlayer.xcarchive CODE_SIGNING_ALLOWED=NO

          # 4. 组装 App (核心修复：自动寻找二进制文件)
          echo "📦 Assembling App bundle..."
          mkdir -p TinPlayer.app
          
          # 自动寻找编译出来的 TinPlayer 二进制文件
          # 排除掉副本，只找 Products
