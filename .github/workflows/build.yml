name: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find Package Directory
        id: find_path
        run: |
          # 寻找 Package.swift 所在的目录
          PKG_PATH=$(find . -name "Package.swift" -exec dirname {} \; | head -n 1)
          echo "项目根目录是: $PKG_PATH"
          echo "path=$PKG_PATH" >> $GITHUB_OUTPUT

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Archive
        working-directory: ${{ steps.find_path.outputs.path }}
        run: |
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        working-directory: ${{ steps.find_path.outputs.path }}
        run: |
          mkdir -p Payload/TinPlayer.app
          
          # 查找二进制文件
          BIN_PATH=$(find ./TinPlayer.xcarchive/Products -type f -name "TinPlayer" | head -n 1)
          echo "找到二进制文件: $BIN_PATH"
          
          if [ -n "$BIN_PATH" ]; then
            cp "$BIN_PATH" Payload/TinPlayer.app/
            chmod +x Payload/TinPlayer.app/TinPlayer
          else
            echo "❌ 无法定位二进制文件，列出所有文件结构："
            find ./TinPlayer.xcarchive
            exit 1
          fi
          
          # 拷贝资源
          find ./TinPlayer.xcarchive -name "Info.plist" -exec cp {} Payload/TinPlayer.app/ \;
          find ./TinPlayer.xcarchive -name "*.car" -exec cp {} Payload/TinPlayer.app/ \;
          
          zip -qr TinPlayer.ipa Payload
          cp TinPlayer.ipa ../../ # 移动到根目录方便上传

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-IPA
          path: "*.ipa"
