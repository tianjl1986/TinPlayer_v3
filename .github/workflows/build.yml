name: TinPlayer Final Victory Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Prepare .swiftpm Environment
        run: |
          set -e
          mkdir -p TinPlayer.swiftpm
          cp -R ./* TinPlayer.swiftpm/ || true
          cd TinPlayer.swiftpm
          sed -i '' '/appIcon: .asset("AppIcon"),/d' Package.swift

      - name: Archive Project
        run: |
          set -e
          cd TinPlayer.swiftpm
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ../TinPlayer.xcarchive \
            -derivedDataPath ../DerivedData \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Extract and Polish
        run: |
          set -e
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          echo "🎯 发现 App: $APP_PATH"
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # 获取生成的 .app 文件夹名字 (例如 TinPlayer.app)
          APP_DIR_NAME=$(basename "$APP_PATH")
          INFOPLIST="Payload/$APP_DIR_NAME/Info.plist"
          
          # 🚀 强力获取二进制文件名
          BIN_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$INFOPLIST" 2>/dev/null || echo "TinPlayer")
          echo "🚀 二进制文件确认为: $BIN_NAME"
          
          # 给二进制加权限
          chmod +x "Payload/$APP_DIR_NAME/$BIN_NAME"
          
          # 补全权限描述（这是扫描音乐库必须的）
          /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string '我们需要访问您的本地音乐库以进行扫描和播放。'" "$INFOPLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$INFOPLIST" 2>/dev/null || true
          
          # 最终打包
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 奇迹时刻 - IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-FINAL
          path: TinPlayer.ipa
