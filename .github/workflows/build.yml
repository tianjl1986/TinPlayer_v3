name: TinPlayer Ultimate Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 自动定位项目目录并进入
          TARGET_DIR=$(find . -name "Sources" -type d -exec dirname {} \; | head -n 1)
          echo "Target directory: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # 2. 强力生成 Package.swift (采用 echo 模式，绝对不炸 YAML 格式)
          echo "// swift-tools-version: 5.9" > Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "import AppleProductTypes" >> Package.swift
          echo "let package = Package(name: \"TinPlayer\", platforms: [.iOS(.v17)], products: [.iOSApplication(name: \"TinPlayer\", targets: [\"AppModule\"], bundleIdentifier: \"com.skeuo.tinplayer\", displayVersion: \"1.3.0\", bundleVersion: \"12\", appIcon: .asset(\"AppIcon\"), accentColor: .presetColor(.indigo), supportedDeviceFamilies: [.phone], supportedInterfaceOrientations: [.portrait], capabilities: [.mediaLibrary(purposeString: \"Music\"), .outgoingNetworkConnections()])], targets: [.executableTarget(name: \"AppModule\", path: \"Sources\")])" >> Package.swift

          # 3. 执行编译 Archive
          echo "🚀 开始编译项目..."
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO

          # 4. 手动组装 .app 文件夹结构 (iOS 安装的硬性要求)
          echo "🏗️ 正在组装 App 结构..."
          mkdir -p TinPlayer.app
          
          # 提取并赋予二进制文件执行权限
          cp ./TinPlayer.xcarchive/Products/usr/local/bin/TinPlayer TinPlayer.app/
          chmod +x TinPlayer.app/TinPlayer

          # 写入核心元数据 Info.plist
          cat > TinPlayer.app/Info.plist <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>TinPlayer</string>
    <key>CFBundleIdentifier</key>
    <string>com.skeuo.tinplayer</string>
    <key>CFBundleName</key>
    <string>TinPlayer</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.3.0</string>
    <key>CFBundleVersion</key>
    <string>12</string>
    <key>LSRequiresIPhoneOS</key>
    <true/>
    <key>MinimumOSVersion</key>
    <string>17.0</string>
    <key>UIRequiredDeviceCapabilities</key>
    <array>
        <string>arm64</string>
    </array>
    <key>UISupportedInterfaceOrientations</key>
    <array>
        <string>UIInterfaceOrientationPortrait</string>
    </array>
</dict>
</plist>
EOF

          # 5. 寻找并合并 Assets.car (图标和皮肤文件)
          ASSETS_CAR=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "Assets.car" | head -n 1)
          if [ -n "$ASSETS_CAR" ]; then
            echo "🎨 找到并集成资源文件: $ASSETS_CAR"
            cp "$ASSETS_CAR" TinPlayer.app/
          fi

          # 6. 生成最终 IPA 产物
          echo "📦 正在打包为 IPA..."
          mkdir -p Payload
          cp -r TinPlayer.app Payload/
          zip -r TinPlayer.ipa Payload
          
          # 移动到根目录以便 Release Action 读取
          cp TinPlayer.ipa $GITHUB_WORKSPACE/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-release-${{ github.run_number }}"
          name: "Tin Player 最终稳定版 #${{ github.run_number }}"
          body: |
            🎉 **编译成功！**
            
            这是为您手动组装的 Tin Player iOS 安装包。
            
            **安装说明：**
            1. 下载下方的 `TinPlayer.ipa`。
            2. 使用 **AltStore**、**Sideloadly** 或 **巨魔 (TrollStore)** 进行签名安装。
            3. 如果由于未签名导致闪退，请务必使用上述工具重新签名。
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
