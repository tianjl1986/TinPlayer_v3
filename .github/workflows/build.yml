name: TinPlayer Architecture Fix Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Fix Package Architecture
        run: |
          set -e
          # 🚀 核心修复 A：将 .executableTarget 改为 .target
          # 这是让 iOSApplication 能够正确链接代码的关键
          sed -i '' 's/\.executableTarget/\.target/g' Package.swift
          
          # 🚀 核心修复 B：创建 .swiftpm 结构
          mkdir -p TinPlayer.swiftpm
          cp -R ./* TinPlayer.swiftpm/ || true
          cd TinPlayer.swiftpm
          sed -i '' '/appIcon: .asset("AppIcon"),/d' Package.swift

      - name: Archive Project
        run: |
          set -e
          cd TinPlayer.swiftpm
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ../TinPlayer.xcarchive \
            -derivedDataPath ../DerivedData \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Final Extraction
        run: |
          set -e
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          mkdir -p Payload
          cp -RL "$APP_PATH" Payload/
          
          APP_DIR_NAME=$(basename "$APP_PATH")
          INFOPLIST="Payload/$APP_DIR_NAME/Info.plist"
          
          # 获取二进制名，如果读不到就强制用 TinPlayer
          BIN_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$INFOPLIST" 2>/dev/null || echo "TinPlayer")
          
          # 🚀 最终兜底：如果这个二进制太小，说明链接失败，我们去缓存里找 AppModule 的库文件替换它
          BIN_SIZE=$(ls -l "Payload/$APP_DIR_NAME/$BIN_NAME" | awk '{print $5}')
          if [ "$BIN_SIZE" -lt 200000 ]; then
             echo "⚠️ 检测到二进制异常偏小 ($BIN_SIZE bytes)，尝试寻找 AppModule 实体..."
             REAL_BIN=$(find ./DerivedData -name "AppModule" -type f -perm +111 -size +1M | head -n 1)
             if [ -n "$REAL_BIN" ]; then
                echo "🎯 发现 AppModule 实体，正在替换..."
                cp -L "$REAL_BIN" "Payload/$APP_DIR_NAME/$BIN_NAME"
             fi
          fi
          
          chmod +x "Payload/$APP_DIR_NAME/$BIN_NAME"
          
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终战斗结论 - IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-ArchFixed
          path: TinPlayer.ipa
