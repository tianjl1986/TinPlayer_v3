name: TinPlayer 14Pro Version

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 寻找项目路径
          SRC_PATH=$(find . -name "Sources" -type d | head -n 1)
          TARGET_DIR=$(dirname "$SRC_PATH")
          cd "$TARGET_DIR"

          # 2. 生成正确的 Package.swift (定义为 executable)
          echo "🧱 Generating Package Config..."
          cat <<EOF > Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v17)],
              products: [.executable(name: "TinPlayer", targets: ["AppModule"])],
              targets: [.executableTarget(name: "AppModule", path: "Sources", resources: [.process("TinPlayer/Assets.xcassets")])]
          )
          EOF

          # 3. 编译 (ARCHIVE)
          echo "🚀 Starting build..."
          xcodebuild archive -scheme "TinPlayer" -destination "generic/platform=iOS" -archivePath ./TinPlayer.xcarchive CODE_SIGNING_ALLOWED=NO

          # 4. 提取 .app 并准备 Payload
          echo "📦 Packaging IPA..."
          mkdir -p Payload
          # 从编译产物中直接拷贝生成的 .app 目录
          APP_PATH=$(find ./TinPlayer.xcarchive/Products/Applications -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          
          # 获取实际的 App 文件夹名称
          APP_NAME=$(basename "$APP_PATH")

          # 5. 注入 14 Pro 适配和权限 (覆盖 Info.plist)
          # 注意：必须注入到 Payload 里的那个 app 目录下
          /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "Payload/$APP_NAME/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.skeuo.tinplayer" "Payload/$APP_NAME/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string '需要访问音乐库以播放音频。'" "Payload/$APP_NAME/Info.plist" || true

          # 6. 确保图标存在
          ICON_SRC=$(find Sources -name "icon.png" | head -n 1)
          if [ -n "$ICON_SRC" ]; then
            cp "$ICON_SRC" "Payload/$APP_NAME/AppIcon60x60@2x.png"
            cp "$ICON_SRC" "Payload/$APP_NAME/AppIcon60x60@3x.png"
          fi

          # 7. 打包成 IPA
          zip -r "$GITHUB_WORKSPACE/TinPlayer.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.5.2"
          name: "Tin Player 14Pro Optimized v1.5.2"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
