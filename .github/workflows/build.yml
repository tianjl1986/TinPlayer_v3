name: TinPlayer Final Victory Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: |
          set -e
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app

          # 1. 强制拷贝二进制（使用 -L 确保跟随符号链接）
          echo "🚀 正在搬运主程序..."
          cp -L ./DerivedData/Build/Products/Release-iphoneos/TinPlayer Payload/TinPlayer.app/TinPlayer
          chmod +x Payload/TinPlayer.app/TinPlayer
          
          # 2. 搬运资源文件
          echo "🎨 正在搬运资源..."
          cp -L ./DerivedData/Build/Products/Release-iphoneos/Assets.car Payload/TinPlayer.app/ 2>/dev/null || true

          # 3. 构造 Info.plist (完全匹配你的 Package.swift)
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>30</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>NSAppleMusicUsageDescription</key>
              <string>我们需要访问您的本地音乐库以进行扫描和播放。</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
          </dict>
          </plist>
          EOF

          # 4. 校验 Payload 内容
          echo "📋 检查打包清单:"
          ls -lh Payload/TinPlayer.app/
          
          if [ ! -s "Payload/TinPlayer.app/TinPlayer" ]; then
             echo "❌ 错误：主程序文件大小为 0，拷贝失败！"
             exit 1
          fi

          # 5. 封装
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终 IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Success
          path: TinPlayer.ipa

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-success-final"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
