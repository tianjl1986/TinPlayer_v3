name: TinPlayer Final Victory Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Prepare .swiftpm Environment
        run: |
          set -e
          # 1. 创建 .swiftpm 目录并拷贝
          mkdir -p TinPlayer.swiftpm
          cp -R ./* TinPlayer.swiftpm/ || true
          cd TinPlayer.swiftpm

          # 2. 🚀 临时移除图标配置，防止 actool 报错中断构建
          sed -i '' '/appIcon: .asset("AppIcon"),/d' Package.swift
          
          # 3. 打印一下现在的 Package.swift 确认修改
          cat Package.swift

      - name: Archive Project
        run: |
          set -e
          cd TinPlayer.swiftpm
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ../TinPlayer.xcarchive \
            -derivedDataPath ../DerivedData \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Extract and Verify IPA
        run: |
          set -e
          echo "📂 正在提取 .app 包..."
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
             echo "🎯 目标锁定: $APP_PATH"
             mkdir -p Payload
             cp -R "$APP_PATH" Payload/
             
             # 确保主程序有执行权限
             BIN_NAME=$(defaults read "$APP_PATH/Info.plist" CFBundleExecutable)
             chmod +x "Payload/$(basename "$APP_PATH")/$BIN_NAME"
             
             zip -q -r TinPlayer.ipa Payload
             echo "✅ 最终胜利！IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"
          else
             echo "❌ 依然没找到 .app 包，检查目录结构..."
             find ./TinPlayer.xcarchive -maxdepth 5
             exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-THE-REAL-ONE
          path: TinPlayer.ipa
