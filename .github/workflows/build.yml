name: TinPlayer Ultimate Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive
          
          echo "🚀 Building TinPlayer..."
          # 执行 Archive
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          echo "📦 Assembling Bundle..."
          mkdir -p Payload/TinPlayer.app
          
          # 1. 【强力搜索】寻找体积大于 1MB 的真正二进制文件
          echo "🔍 Searching for the real executable (min size 1MB)..."
          # 在整个工作目录和 Archive 目录中搜索
          REAL_BINARY=$(find . -type f -size +1M ! -name "*.plist" ! -name "*.sh" ! -name "*.car" ! -path "*/.git/*" | head -n 1)
          
          if [ -z "$REAL_BINARY" ]; then
             echo "⚠️ Not found > 1MB, checking > 500KB..."
             REAL_BINARY=$(find . -type f -size +500k ! -name "*.plist" ! -name "*.sh" ! -name "*.car" ! -path "*/.git/*" | head -n 1)
          fi

          if [ -n "$REAL_BINARY" ]; then
            echo "✅ Found Real Binary: $REAL_BINARY"
            cp "$REAL_BINARY" Payload/TinPlayer.app/TinPlayer
            chmod +x Payload/TinPlayer.app/TinPlayer
          else
            echo "❌ ERROR: No binary found! Printing directory tree for debugging:"
            find . -maxdepth 5
            exit 1
          fi
          
          # 2. 抓取资源文件 (Assets.car)
          echo "🔍 Looking for Assets.car..."
          ASSETS_CAR=$(find . -name "Assets.car" | head -n 1)
          if [ -n "$ASSETS_CAR" ]; then
            echo "✅ Found Assets.car at $ASSETS_CAR"
            cp "$ASSETS_CAR" Payload/TinPlayer.app/
          fi
          
          # 3. 抓取所有资源包 (Swift Bundles)
          echo "🔍 Looking for Resource Bundles..."
          find . -name "*.bundle" -type d -exec cp -rv {}/. Payload/TinPlayer.app/ \; || true

          # 4. 生成 Info.plist (核心修复：14 Pro 适配)
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>TinPlayer</string>
              <key>CFBundleIdentifier</key>
              <string>com.skeuo.tinplayer</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>TinPlayer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.3.0</string>
              <key>CFBundleVersion</key>
              <string>14</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
              </array>
          </dict>
          </plist>
          EOF
          
          # 5. 打印打包状态，防止又是空包
          echo "📊 Final Bundle Content:"
          ls -lh Payload/TinPlayer.app/
          
          # 6. 压缩成 IPA
          echo "🗜️ Zipping IPA..."
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Done! Final IPA is ready."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          body: "🎉 终极修复版：已采用物理大小检测逻辑，确保 IPA 包含真实的二进制文件和资源。支持 iPhone 14 Pro 分辨率。"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
