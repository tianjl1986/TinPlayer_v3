name: TinPlayer Truth-Seeker Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Archive Project
        run: |
          set -e
          # 使用 archive 命令，这是 iOS 发布的标准流程
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Inspect Archive and Extract
        run: |
          set -e
          echo "📂 正在深度解剖 Archive 结构..."
          # 打印 Archive 里的所有文件，我看你代码到底钻哪去了
          find ./TinPlayer.xcarchive -maxdepth 5
          
          # 尝试从各种可能的路径提取 .app
          # 路径 A: 标准路径
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
             echo "🎯 发现 App 包: $APP_PATH"
             mkdir -p Payload
             cp -R "$APP_PATH" Payload/
             
             # 检查二进制大小
             BIN_NAME=$(defaults read "$APP_PATH/Info.plist" CFBundleExecutable)
             echo "🚀 主程序 [$BIN_NAME] 大小: $(ls -lh "$APP_PATH/$BIN_NAME" | awk '{print $4}')"
             
             zip -q -r TinPlayer.ipa Payload
             echo "✅ 最终结论 - IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"
          else
             echo "❌ 绝望：Archive 里竟然没有 .app 包！"
             exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Truth
          path: TinPlayer.ipa
