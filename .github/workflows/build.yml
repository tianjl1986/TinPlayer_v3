name: TinPlayer Ultimate Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          
          # 0. 清理旧产物
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive
          
          echo "🚀 Starting build..."
          # 1. 执行 Archive 打包
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          echo "📦 Assembling App bundle..."
          
          # 2. 创建 Payload 结构
          mkdir -p Payload/TinPlayer.app
          
          # 3. 提取二进制执行文件
          echo "🔍 Searching for executable binary..."
          BINARY_PATH=$(find ./TinPlayer.xcarchive/Products -type f -perm +111 ! -name "*.plist" ! -name "*.sh" | head -n 1)
          if [ -z "$BINARY_PATH" ]; then
             BINARY_PATH=$(find ./TinPlayer.xcarchive -type f -perm +111 ! -name "*.plist" ! -name "*.sh" | head -n 1)
          fi
          
          if [ -n "$BINARY_PATH" ]; then
            echo "✅ Found Binary: $BINARY_PATH"
            cp "$BINARY_PATH" Payload/TinPlayer.app/TinPlayer
            chmod +x Payload/TinPlayer.app/TinPlayer
          else
            echo "❌ Fatal Error: Executable binary not found!"
            exit 1
          fi
          
          # 4. 提取 Asset Catalog (增强搜索模式，解决文件过小问题)
          echo "🔍 Searching for Assets.car..."
          # 优先在编译结果中找
          ASSETS_CAR=$(find . -name "Assets.car" | head -n 1)
          if [ -z "$ASSETS_CAR" ]; then
             # 如果没找到，去系统缓存深度搜索
             ASSETS_CAR=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "Assets.car" -path "*/TinPlayer*/*" | head -n 1)
          fi
          
          if [ -n "$ASSETS_CAR" ]; then
            echo "✅ Found Assets.car: $ASSETS_CAR"
            cp "$ASSETS_CAR" Payload/TinPlayer.app/
          else
            echo "⚠️ Warning: Assets.car not found. App icons might be missing."
          fi
          
          # 5. 复制其他资源 (本地化文件等)
          find . -name "*.lproj" -exec cp -r {} Payload/TinPlayer.app/ \; || true
          
          # 6. 生成 Info.plist (确保分辨率和基本配置正确)
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>TinPlayer</string>
              <key>CFBundleIdentifier</key>
              <string>com.skeuo.tinplayer</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>TinPlayer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.3.0</string>
              <key>CFBundleVersion</key>
              <string>12</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
              </array>
          </dict>
          </plist>
