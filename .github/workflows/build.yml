name: TinPlayer Master Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build with DerivedData
        run: |
          set -e
          echo "🚀 Building with standard 'build' command..."
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app

          echo "🔍 Searching for the real App bundle in DerivedData..."
          # 自动搜寻生成的 .app 目录
          APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "✅ Found App Bundle: $APP_PATH"
            cp -R "$APP_PATH/" Payload/TinPlayer.app/
          else
            echo "⚠️ No .app bundle found, fallback to manual binary search..."
            # 搜寻最大的可执行二进制文件（通常 > 5MB）
            REAL_BINARY=$(find ./DerivedData -type f -perm +111 -size +1M ! -name "*.plist" | sort -rn | head -n 1)
            if [ -z "$REAL_BINARY" ]; then
               REAL_BINARY=$(find ./DerivedData -type f -perm +111 ! -name "*.plist" | sort -rn | head -n 1)
            fi
            echo "✅ Found Binary: $REAL_BINARY"
            cp "$REAL_BINARY" Payload/TinPlayer.app/TinPlayer
            chmod +x Payload/TinPlayer.app/TinPlayer
          fi

          # 3. 补全 Info.plist (核心：增加文件共享与权限配置)
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>20</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>LSSupportsOpeningDocumentsInPlace</key><true/>
              <key>NSAppleMusicUsageDescription</key>
              <string>我们需要访问您的媒体库以扫描和播放本地音乐。</string>
              <key>NSLocalNetworkUsageDescription</key>
              <string>获取歌曲封面和歌词需要网络连接。</string>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

          # 4. 资产补全 (Assets.car)
          if [ ! -f "Payload/TinPlayer.app/Assets.car" ]; then
             echo "🔍 Assets.car missing, searching..."
             ASSETS_CAR=$(find ./DerivedData -name "Assets.car" | head -n 1)
             if [ -n "$ASSETS_CAR" ]; then
                cp "$ASSETS_CAR" Payload/TinPlayer.app/
             fi
          fi

          # 5. 封装 IPA
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Done! Final IPA Size: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Build
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-release-${{ github.run_number }}"
          name: "Tin Player Final Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
