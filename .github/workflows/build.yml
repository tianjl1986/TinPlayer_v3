name: TinPlayer Search-and-Destroy Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: |
          set -e
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: The Great Hunt
        run: |
          set -e
          mkdir -p Payload/TinPlayer.app

          echo "🔎 正在执行地毯式搜索，寻找包含核心代码的文件..."
          
          # 1. 寻找包含 'SkeuoPlayerApp' 字符串的二进制文件 (这是你的 App 入口)
          # 我们在 Build 目录下搜索所有大于 1MB 的可执行文件
          CORE_FILE=$(grep -lR "SkeuoPlayerApp" ./DerivedData/Build/Products || true | head -n 1)
          
          if [ -z "$CORE_FILE" ]; then
             echo "⚠️ 在 Products 没找到，扩大搜索范围到 Intermediates..."
             CORE_FILE=$(grep -lR "SkeuoPlayerApp" ./DerivedData/Build/Intermediates.noindex || true | head -n 1)
          fi

          if [ -n "$CORE_FILE" ] && [ -f "$CORE_FILE" ]; then
             echo "🎯 目标锁定！核心代码在: $CORE_FILE"
             echo "📊 大小: $(du -sh "$CORE_FILE")"
             cp -L "$CORE_FILE" Payload/TinPlayer.app/TinPlayer
          else
             echo "❌ 还是找不到核心代码，最后挣扎：抓取最大的二进制文件..."
             BIGGEST=$(find ./DerivedData -type f -perm +111 -size +1M ! -path "*/.git/*" | xargs du -s | sort -rn | head -n 1 | awk '{print $2}')
             if [ -n "$BIGGEST" ]; then
                echo "📢 抓取最大文件: $BIGGEST"
                cp -L "$BIGGEST" Payload/TinPlayer.app/TinPlayer
             fi
          fi

          # 2. 检查抓取结果
          if [ ! -s "Payload/TinPlayer.app/TinPlayer" ]; then
             echo "💀 致命错误：抓到的主程序是空的！"
             exit 1
          fi

          # 3. 构造 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>31</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>NSAppleMusicUsageDescription</key><string>扫描本地音乐</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
          </dict>
          </plist>
          EOF

          # 4. 搜刮资源
          find ./DerivedData -name "Assets.car" -exec cp {} Payload/TinPlayer.app/ \; 2>/dev/null || true

          # 5. 打包
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终结论 - IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-SearchAndDestroy
          path: TinPlayer.ipa
