name: TinPlayer Full-Harvest Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: |
          set -e
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app/Frameworks

          echo "🔍 正在进行全量搜刮（主程序 + 动态库 + 资源）..."
          
          # 1. 抓取主可执行文件
          REAL_BINARY=$(find ./DerivedData/Build/Products -name "TinPlayer" -type f ! -name "*.*" -perm +111 | head -n 1)
          if [ -n "$REAL_BINARY" ]; then
             echo "✅ 找到主程序: $REAL_BINARY"
             cp "$REAL_BINARY" Payload/TinPlayer.app/TinPlayer
             chmod +x Payload/TinPlayer.app/TinPlayer
          fi

          # 2. 核心：搜刮所有的动态库 (Frameworks / dylib)
          # 你的代码逻辑很可能就藏在这些文件里
          echo "🔍 正在搜刮代码库..."
          find ./DerivedData/Build/Products -name "*.framework" -exec cp -R {} Payload/TinPlayer.app/Frameworks/ \; 2>/dev/null || true
          find ./DerivedData/Build/Products -name "*.dylib" -exec cp {} Payload/TinPlayer.app/Frameworks/ \; 2>/dev/null || true
          
          # 3. 搜刮资源文件
          find ./DerivedData/Build/Products -name "Assets.car" -exec cp {} Payload/TinPlayer.app/ \; 2>/dev/null || true

          # 4. 构造 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>28</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>LSSupportsOpeningDocumentsInPlace</key><true/>
              <key>NSAppleMusicUsageDescription</key>
              <string>我们需要访问您的媒体库以播放本地音乐。</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
          </dict>
          </plist>
          EOF

          # 5. 封装
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终 IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"
          
          if [ $(du -m TinPlayer.ipa | cut -f1) -lt 1 ]; then
             echo "⚠️ 警告：IPA 依然小于 1MB，列出所有编译产物供分析："
             find ./DerivedData/Build/Products -maxdepth 4
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-FullHarvest
          path: TinPlayer.ipa

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-fullharvest"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
