name: TinPlayer Ultimate Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          # 注意：下面的每一行开头都有空格，千万不要删掉它们！
          TARGET_DIR=$(find . -name "Sources" -type d -exec dirname {} \; | head -n 1)
          echo "Target directory: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          cat << 'EOF' > Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          import AppleProductTypes

          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v17)],
              products: [
                  .iOSApplication(
                      name: "TinPlayer",
                      targets: ["AppModule"],
                      bundleIdentifier: "com.skeuo.tinplayer",
                      displayVersion: "1.3.0",
                      bundleVersion: "12",
                      appIcon: .asset("AppIcon"),
                      accentColor: .presetColor(.indigo),
                      supportedDeviceFamilies: [.phone],
                      supportedInterfaceOrientations: [.portrait],
                      capabilities: [
                          .mediaLibrary(purposeString: "Music"),
                          .outgoingNetworkConnections()
                      ]
                  )
              ],
              targets: [
                  .executableTarget(
                      name: "AppModule",
                      path: "Sources"
                  )
              ]
          )
          EOF

          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO

          APP_PATH=$(find ./TinPlayer.xcarchive/Products -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp
