name: TinPlayer Super Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Current Structure (ChatGPT Advice)
        run: |
          echo "=== 1. 当前所在位置 ==="
          pwd
          echo "=== 2. 详细文件列表 (ls -R) ==="
          ls -R
          echo "========================"

      - name: Force Reconstruct Project
        run: |
          # 查找 Sources 文件夹在哪
          SOURCES_DIR=$(find . -name "Sources" -type d | head -n 1)
          if [ -z "$SOURCES_DIR" ]; then
            echo "❌ 错误：在你的仓库里找不到 Sources 文件夹！请确认你是否上传了代码。"
            exit 1
          fi
          
          # 进入 Sources 所在的父目录
          PROJ_ROOT=$(dirname "$SOURCES_DIR")
          cd "$PROJ_ROOT"
          echo "项目根目录确定为: $PROJ_ROOT"
          
          # 强制生成 Package.swift (防止上传的文件损坏或命名错误)
          rm -f Package.swift
          cat <<EOF > Package.swift
          // swift-tools-version: 5.8
          import PackageDescription
          import AppleProductTypes

          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v16)],
              products: [
                  .iOSApplication(
                      name: "TinPlayer",
                      targets: ["AppModule"],
                      bundleIdentifier: "com.skeuo.tinplayer",
                      displayVersion: "1.3.0",
                      bundleVersion: "12",
                      appIcon: .asset("AppIcon"),
                      accentColor: .presetColor(.indigo),
                      supportedDeviceFamilies: [.phone],
                      supportedInterfaceOrientations: [.portrait],
                      capabilities: [
                          .mediaLibrary(purposeString: "我们需要访问您的本地音乐库以进行扫描和播放。"),
                          .outgoingNetworkConnections()
                      ]
                  )
              ],
              targets: [
                  .executableTarget(
                      name: "AppModule",
                      path: "Sources"
                  )
              ]
          )
          EOF
          
          # 将项目目录存入环境变量供后面使用
          echo "PROJ_ROOT=$PROJ_ROOT" >> $GITHUB_ENV

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build App
        run: |
          cd ${{ env.PROJ_ROOT }}
          xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath ./build_data \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        if: success()
        run: |
          cd ${{ env.PROJ_ROOT }}
          mkdir -p Payload
          APP_PATH=$(find ./build_data -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -qr TinPlayer.ipa Payload
            mv TinPlayer.ipa $GITHUB_WORKSPACE/
          else
            echo "❌ 编译成功了但找不到 .app 文件"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-IPA
          path: "*.ipa"
