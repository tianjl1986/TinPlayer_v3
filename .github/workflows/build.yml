name: TinPlayer Absolute Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa DerivedData
          
          echo "🚀 Building Release Binary..."
          xcodebuild build \
            -scheme "TinPlayer" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO

          echo "📦 Manual Assembly (The 'Hard' Way)..."
          mkdir -p Payload/TinPlayer.app
          
          # 1. 拷贝二进制文件 (路径根据日志硬编码)
          # 注意：Release 模式下路径是 Release-iphoneos
          cp ./DerivedData/Build/Products/Release-iphoneos/TinPlayer Payload/TinPlayer.app/TinPlayer
          chmod +x Payload/TinPlayer.app/TinPlayer

          # 2. 强行编译资源 (没有这个 App 就没有图标和图片)
          echo "🎨 Compiling Assets..."
          xcrun actool Assets.xcassets \
            --compile Payload/TinPlayer.app \
            --platform iphoneos \
            --minimum-deployment-target 17.0 \
            --app-icon AppIcon \
            --output-partial-info-plist partial.plist

          # 3. 生成最简 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>17</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
          </dict>
          </plist>
          EOF
          
          # 4. 最终大小校验
          echo "📊 Structure check:"
          ls -R Payload/TinPlayer.app
          du -sh Payload/TinPlayer.app

          # 5. 打包
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Success!"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
