name: TinPlayer SwiftPM App Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive
          
          echo "🚀 Building SwiftPM App..."
          # 执行编译
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          echo "📦 Locating App Bundle..."
          # 关键：在整个 Archive 产物中寻找 .app 文件夹
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "⚠️ Not found in Archive, searching DerivedData..."
            # 如果 Archive 里没有，去编译缓存里暴力搜索
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "TinPlayer.app" -type d -path "*/Release-iphoneos/*" | head -n 1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "✅ Found App Bundle at: $APP_PATH"
            # 检查一下包的大小，确保不是空壳
            du -sh "$APP_PATH"
            
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            
            # 补丁：确保二进制文件有执行权限（针对部分签名剥离的情况）
            BINARY_NAME=$(defaults read "$(pwd)/$APP_PATH/Info.plist" CFBundleExecutable 2>/dev/null || echo "TinPlayer")
            chmod +x "Payload/$(basename "$APP_PATH")/$BINARY_NAME"
          else
            echo "❌ ERROR: App Bundle (.app) not found! Listing all products:"
            find . -name "*" -maxdepth 3
            exit 1
          fi
          
          # 压缩成 IPA
          echo "🗜️ Zipping IPA..."
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Done! Final IPA is ready."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          body: "🚀 完美修复版：直接抓取完整 .app 包，包含所有资源和正确的二进制文件。支持 iPhone 14 Pro 分辨率。"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
