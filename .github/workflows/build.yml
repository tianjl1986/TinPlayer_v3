name: TinPlayer Build Final

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Force Fix Project Root
        run: |
          SOURCES_DIR=$(find . -name "Sources" -type d | head -n 1)
          PROJ_ROOT=$(dirname "$SOURCES_DIR")
          cd "$PROJ_ROOT"
          
          # 手写 Package.swift 确保 100% 正确
          rm -f Package.swift
          cat <<EOF > Package.swift
          // swift-tools-version: 5.8
          import PackageDescription
          import AppleProductTypes
          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v16)],
              products: [.iOSApplication(
                  name: "TinPlayer",
                  targets: ["AppModule"],
                  bundleIdentifier: "com.skeuo.tinplayer",
                  displayVersion: "1.3.0",
                  bundleVersion: "12",
                  appIcon: .asset("AppIcon"),
                  accentColor: .presetColor(.indigo),
                  supportedDeviceFamilies: [.phone],
                  supportedInterfaceOrientations: [.portrait],
                  capabilities: [
                      .mediaLibrary(purposeString: "访问本地音乐"),
                      .outgoingNetworkConnections()
                  ]
              )],
              targets: [.executableTarget(name: "AppModule", path: "Sources")]
          )
          EOF
          echo "PROJ_ROOT=$PROJ_ROOT" >> $GITHUB_ENV

      - name: Build App
        run: |
          cd ${{ env.PROJ_ROOT }}
          xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath ./build_data \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA (ChatGPT + Multi-Search)
        run: |
          cd ${{ env.PROJ_ROOT }}
          
          echo "🔍 正在多路径查找 .app 文件..."
          
          # 方案 A: 按照 ChatGPT 建议的精确路径找
          APP_PATH="./build_data/Build/Products/Release-iphoneos/TinPlayer.app"
          
          # 方案 B: 如果方案 A 不在，就全局搜索 .app 文件夹
          if [ ! -d "$APP_PATH" ]; then
            echo "⚠️ 精确路径没找到，正在全局搜索..."
            APP_PATH=$(find ./build_data -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          fi
          
          # 方案 C: 保底搜索
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find ./build_data -name "*.app" -type d | head -n 1)
          fi

