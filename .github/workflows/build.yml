name: TinPlayer Absolute Target Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build Explicit Target
        run: |
          set -e
          # 🚀 关键：我们不指定 scheme，而是直接指定编译 AppModule 目标
          # 并强制让它输出到一个我们已知的路径
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -target "AppModule" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app

          echo "🔍 寻找编译出的核心二进制文件..."
          # 寻找名为 AppModule 的二进制文件 (因为 Target 叫 AppModule)
          BINARY_PATH=$(find ./DerivedData -name "AppModule" -type f ! -name "*.*" -perm +111 | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
             echo "⚠️ 未找到 AppModule，继续搜寻最大的二进制文件..."
             BINARY_PATH=$(find ./DerivedData/Build/Products -type f -perm +111 -size +1M ! -name "*.plist" | head -n 1)
          fi

          if [ -n "$BINARY_PATH" ]; then
             echo "✅ 锁定核心二进制: $BINARY_PATH"
             echo "📊 体积: $(du -sh "$BINARY_PATH")"
             cp -L "$BINARY_PATH" Payload/TinPlayer.app/TinPlayer
             chmod +x Payload/TinPlayer.app/TinPlayer
          else
             echo "❌ 失败：找遍了全家也没找到超过 1MB 的代码库！"
             find ./DerivedData -maxdepth 5
             exit 1
          fi

          # 注入 Info.plist (必须和 Package.swift 一致)
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>33</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>NSAppleMusicUsageDescription</key><string>我们需要访问您的媒体库以进行扫描和播放。</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
          </dict>
          </plist>
          EOF

          # 搜刮资源
          find ./DerivedData -name "Assets.car" -exec cp {} Payload/TinPlayer.app/ \; 2>/dev/null || true

          # 打包
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终结论 - IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-AbsoluteTarget
          path: TinPlayer.ipa
