name: Debug and Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List All Files (Debug)
        run: |
          echo "=== 当前所有文件列表 ==="
          ls -R
          echo "========================"

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Try Build (Auto Detect)
        run: |
          # 寻找 Package.swift 所在的目录
          PKG_PATH=$(find . -name "Package.swift" -exec dirname {} \; | head -n 1)
          
          if [ -z "$PKG_PATH" ]; then
            echo "❌ 错误：在你的仓库里找不到 Package.swift！请检查是否已经上传了该文件。"
            exit 1
          fi
          
          echo "找到项目在: $PKG_PATH"
          cd "$PKG_PATH"
          
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export and Upload
        if: success()
        run: |
          PKG_PATH=$(find . -name "Package.swift" -exec dirname {} \; | head -n 1)
          cd "$PKG_PATH"
          mkdir -p Payload/TinPlayer.app
          find ./TinPlayer.xcarchive/Products -type f -name "TinPlayer" -exec cp {} Payload/TinPlayer.app/ \;
          find ./TinPlayer.xcarchive -name "Info.plist" -exec cp {} Payload/TinPlayer.app/ \;
          find ./TinPlayer.xcarchive -name "*.car" -exec cp {} Payload/TinPlayer.app/ \;
          zip -qr TinPlayer.ipa Payload
          mv TinPlayer.ipa $GITHUB_WORKSPACE/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-IPA
          path: "*.ipa"
