name: TinPlayer Ultimate Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 自动寻找代码位置
          TARGET_DIR=$(find . -name "Sources" -type d -exec dirname {} \; | head -n 1)
          cd "$TARGET_DIR"
          
          # 2. 自动修复图片资源索引 (解决黑胶唱机全白的问题)
          echo "🔧 Fixing Images..."
          find Sources/Assets.xcassets -name "Contents.json" -exec sed -i '' 's/"idiom" : "universal"/"idiom" : "universal", "filename" : "placeholder.png"/g' {} +
          for d in Sources/Assets.xcassets/*.imageset; do
            if [ -d "$d" ]; then
              IMG_FILE=$(ls "$d"/*.png 2>/dev/null | head -n 1 | xargs basename 2>/dev/null || echo "")
              if [ -n "$IMG_FILE" ]; then
                sed -i '' "s/\"filename\" : \"placeholder.png\"/\"filename\" : \"$IMG_FILE\"/g" "$d/Contents.json"
              fi
            fi
          done

          # 3. 重新生成项目配置文件
          echo "🧱 Configuring Project..."
          echo "// swift-tools-version: 5.9" > Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "import AppleProductTypes" >> Package.swift
          echo "let package = Package(name: \"TinPlayer\", platforms: [.iOS(.v17)], products: [.iOSApplication(name: \"TinPlayer\", targets: [\"AppModule\"], bundleIdentifier: \"com.skeuo.tinplayer\", displayVersion: \"1.3.1\", bundleVersion: \"13\", appIcon: .asset(\"AppIcon\"), accentColor: .presetColor(.indigo), supportedDeviceFamilies: [.phone], supportedInterfaceOrientations: [.portrait], capabilities: [.mediaLibrary(purposeString: \"播放您的本地音乐库\"), .outgoingNetworkConnections()])], targets: [.executableTarget(name: \"AppModule\", path: \"Sources\")])" >> Package.swift

          # 4. 执行编译
          echo "🚀 Building App..."
          xcodebuild archive -scheme "TinPlayer" -destination "generic/platform=iOS" -archivePath ./TinPlayer.xcarchive CODE_SIGNING_ALLOWED=NO

          # 5. 组装安装包结构 (增加图标和权限配置)
          echo "🏗️ Assembling..."
          mkdir -p TinPlayer.app
          cp ./TinPlayer.xcarchive/Products/usr/local/bin/TinPlayer TinPlayer.app/
          chmod +x TinPlayer.app/TinPlayer

          # 6. 生成核心元数据 (修复没图标、没声音、无法播放的问题)
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"><plist version=\"1.0\"><dict><key>CFBundleExecutable</key><string>TinPlayer</string><key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string><key>CFBundleName</key><string>TinPlayer</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.3.1</string><key>CFBundleVersion</key><string>13</string><key>LSRequiresIPhoneOS</key><true/><key>MinimumOSVersion</key><string>17.0</string><key>NSAppleMusicUsageDescription</key><string>我们需要访问您的音乐库以播放歌曲。</string><key>CFBundleIcons</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconFiles</key><array><string>AppIcon</string></array><key>CFBundleIconName</key><string>AppIcon</string></dict></dict><key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array><key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array></dict></plist>" > TinPlayer.app/Info.plist

          # 7. 提取资源文件
          ASSETS_CAR=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "Assets.car" | head -n 1)
          if [ -n "$ASSETS_CAR" ]; then
            cp "$ASSETS_CAR" TinPlayer.app/
          fi

          # 8. 导出最终 IPA
          mkdir -p Payload
          cp -r TinPlayer.app Payload/
          zip -r "$GITHUB_WORKSPACE/TinPlayer.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.1-final-${{ github.run_number }}"
          name: "Tin Player 完美修复版 #${{ github.run_number }}"
          body: |
            ✅ 已经修复以下问题：
            1. 增加了 App 启动图标。
            2. 修复了界面图片加载失败（全白）的问题。
            3. 增加了音乐库访问授权提示（解决无法播放的问题）。
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
