name: TinPlayer Ultimate Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e

          # 1. 定位目录
          SRC_PATH=$(find . -name "Sources" -type d | head -n 1)
          TARGET_DIR=$(dirname "$SRC_PATH")
          cd "$TARGET_DIR"
          
          # 2. 修复图片
          find . -name "Contents.json" -path "*/Assets.xcassets/*" | while read -r file; do
            sed -i '' 's/"idiom" : "universal"/"idiom" : "universal", "filename" : "placeholder.png"/g' "$file" || true
            dir=$(dirname "$file")
            IMG_FILE=$(ls "$dir"/*.png 2>/dev/null | head -n 1 | xargs basename 2>/dev/null || echo "")
            if [ -n "$IMG_FILE" ]; then
              sed -i '' "s/\"filename\" : \"placeholder.png\"/\"filename\" : \"$IMG_FILE\"/g" "$file" || true
            fi
          done || true

          # 3. 生成 Package.swift
          echo "// swift-tools-version: 5.9" > Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "import AppleProductTypes" >> Package.swift
          echo "let package = Package(name: \"TinPlayer\", platforms: [.iOS(.v17)], products: [.iOSApplication(name: \"TinPlayer\", targets: [\"AppModule\"], bundleIdentifier: \"com.skeuo.tinplayer\", displayVersion: \"1.3.7\", bundleVersion: \"19\", appIcon: .asset(\"AppIcon\"), accentColor: .presetColor(.indigo), supportedDeviceFamilies: [.phone], supportedInterfaceOrientations: [.portrait], capabilities: [.mediaLibrary(purposeString: \"播放音乐\"), .outgoingNetworkConnections()])], targets: [.executableTarget(name: \"AppModule\", path: \"Sources\")])" >> Package.swift

          # 4. 编译
          xcodebuild archive -scheme "TinPlayer" -destination "generic/platform=iOS" -archivePath ./TinPlayer.xcarchive CODE_SIGNING_ALLOWED=NO

          # 5. 组装
          mkdir -p TinPlayer.app
          cp ./TinPlayer.xcarchive/Products/usr/local/bin/TinPlayer TinPlayer.app/
          chmod +x TinPlayer.app/TinPlayer

          # 6. 生成 Info.plist
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"><plist version=\"1.0\"><dict><key>CFBundleExecutable</key><string>TinPlayer</string><key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string><key>CFBundleName</key><string>TinPlayer</string><key>CFBundleDisplayName</key><string>TinPlayer</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.3.7</string><key>CFBundleVersion</key><string>19</string><key>MinimumOSVersion</key><string>17.0</string><key>LSRequiresIPhoneOS</key><true/><key>UILaunchScreen</key><dict/><key>NSAppleMusicUsageDescription</key><string>需要访问音乐库以播放您的歌曲。</string><key>CFBundleIcons</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconFiles</key><array><string>AppIcon60x60</string></array><key>CFBundleIconName</key><string>AppIcon60x60</string></dict></dict><key>CFBundleSupportedPlatforms</key><array><string>iPhoneOS</string></array><key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array><key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array></dict></plist>" > TinPlayer.app/Info.plist

          # 7. 强力图标修复：优先寻找 icon.png
          echo "🖼️ Searching for correct icon..."
          ICON_PATH=$(find . -name "icon.png" | head -n 1)
          if [ -n "$ICON_PATH" ]; then
            cp "$ICON_PATH" TinPlayer.app/AppIcon60x60@2x.png
            cp "$ICON_PATH" TinPlayer.app/AppIcon60x60@3x.png
            echo "✅ Used $ICON_PATH as App Icon"
          else
            # 如果找不到，再寻找 AppIcon 目录下的最大图片
            ICON_SET=$(find . -name "AppIcon.appiconset" -type d | head -n 1)
            BIG_ICON=$(ls -S "$ICON_SET"/*.png 2>/dev/null | head -n 1)
            cp "$BIG_ICON" TinPlayer.app/AppIcon60x60@2x.png
            cp "$BIG_ICON" TinPlayer.app/AppIcon60x60@3x.png
          fi

          # 8. 拷贝 Assets.car
          ASSETS_CAR=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "Assets.car" | head -n 1)
          if [ -n "$ASSETS_CAR" ]; then
            cp "$ASSETS_CAR" TinPlayer.app/
          fi

          # 9. 打包
          mkdir -p Payload
          cp -r TinPlayer.app Payload/
          zip -r "$GITHUB_WORKSPACE/TinPlayer.ipa" Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.7-final-${{ github.run_number }}"
          name: "Tin Player 图标修复版 #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
