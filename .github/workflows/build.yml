name: TinPlayer Final Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          
          echo "🚀 Preparing project structure..."
          ORIGINAL_FOLDER=$(basename $(pwd))
          rm -f Sources/SkeuoPlayerApp.swift
          
          cd ..
          mv "$ORIGINAL_FOLDER" TinPlayer.swiftpm
          cd TinPlayer.swiftpm
          
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive DerivedData
          
          echo "🚀 Building TinPlayer.swiftpm..."
          # 注意：这里我们让 xcodebuild 正常生成图标
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO
          
          echo "📦 Assembling Bundle..."
          APP_BUNDLE="./TinPlayer.xcarchive/Products/Applications/TinPlayer.app"
          
          if [ -d "$APP_BUNDLE" ]; then
              echo "✅ Found App Bundle in xcarchive"
              mkdir -p Payload
              cp -R "$APP_BUNDLE" Payload/
          else
              echo "❌ ERROR: Cannot find TinPlayer.app!"
              exit 1
          fi
          
          # 📝 使用 plutil 精确修改 Info.plist，保留原有的图标配置
          PLIST="Payload/TinPlayer.app/Info.plist"
          
          echo "🛠 Patching Info.plist..."
          plutil -replace CFBundleIdentifier -string "com.skeuo.tinplayer" "$PLIST"
          plutil -replace CFBundleShortVersionString -string "1.3.0" "$PLIST"
          plutil -replace CFBundleVersion -string "35" "$PLIST"
          plutil -replace MinimumOSVersion -string "16.0" "$PLIST"
          
          # 注入权限描述
          plutil -replace NSAppleMusicUsageDescription -string "我们需要访问您的媒体库以播放本地音乐。" "$PLIST"
          plutil -replace NSPhotoLibraryUsageDescription -string "我们需要访问相册以保存或读取封面图片。" "$PLIST"
          plutil -replace NSLocalNetworkUsageDescription -string "我们需要访问本地网络以获取歌词和元数据。" "$PLIST"
          
          # 确保后台播放模式
          plutil -replace UIBackgroundModes -array -string "audio" "$PLIST"
          
          echo "📊 Final Payload size: $(du -sh Payload | cut -f1)"
          zip -q -r TinPlayer.ipa Payload
          
          cd ..
          mv TinPlayer.swiftpm "$ORIGINAL_FOLDER"
          echo "✅ Done! IPA Created."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
