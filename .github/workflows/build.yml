name: TinPlayer Final Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          
          echo "🚀 Preparing project structure..."
          # 获取原始文件夹名以便后续还原
          ORIGINAL_FOLDER=$(basename $(pwd))
          echo "Current folder is $ORIGINAL_FOLDER, renaming to TinPlayer.swiftpm"
          
          # 重命名目录
          cd ..
          mv "$ORIGINAL_FOLDER" TinPlayer.swiftpm
          cd TinPlayer.swiftpm
          
          # 清理旧产物
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive DerivedData
          
          echo "🚀 Building TinPlayer.swiftpm..."
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO
          
          echo "📦 Assembling Bundle..."
          mkdir -p Payload/TinPlayer.app
          
          # 🔍 寻找真正的二进制文件
          echo "🔍 Searching for the real executable binary..."
          REAL_BINARY=$(find ./DerivedData -type f -perm +111 ! -name "*.*" -size +1M | head -n 1)
          
          if [ -z "$REAL_BINARY" ]; then
             echo "⚠️ Not found in DerivedData, checking xcarchive..."
             REAL_BINARY=$(find ./TinPlayer.xcarchive -type f -perm +111 ! -name "*.*" -size +1M | head -n 1)
          fi
          
          if [ -n "$REAL_BINARY" ]; then
            echo "✅ Found Real Binary: $REAL_BINARY"
            cp "$REAL_BINARY" Payload/TinPlayer.app/TinPlayer
            chmod +x Payload/TinPlayer.app/TinPlayer
          else
            echo "❌ ERROR: No executable binary found (> 1MB)!"
            exit 1
          fi
          
          # 🔍 寻找资源文件
          ASSETS_CAR=$(find ./DerivedData ./TinPlayer.xcarchive -name "Assets.car" | head -n 1)
          if [ -n "$ASSETS_CAR" ]; then
            cp "$ASSETS_CAR" Payload/TinPlayer.app/
          fi
          
          # 📝 生成 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>22</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>NSAppleMusicUsageDescription</key>
              <string>我们需要访问您的本地音乐库以进行扫描和播放。</string>
              <key>NSLocalNetworkUsageDescription</key>
              <string>我们需要访问网络以获取歌词信息。</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
              <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array>
          </dict>
          </plist>
          EOF
          
          echo "📊 Final Payload size: $(du -sh Payload | cut -f1)"
          zip -q -r TinPlayer.ipa Payload
          
          # 【重要：还原目录名】防止 GitHub Actions 清理失败
          echo "🔄 Restoring folder name..."
          cd ..
          mv TinPlayer.swiftpm "$ORIGINAL_FOLDER"
          echo "✅ Done! IPA Created."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
