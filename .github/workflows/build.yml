- name: Archive App
  run: |
    cd ${{ env.PROJ_ROOT }}

    xcodebuild archive \
      -scheme "TinPlayer" \
      -destination "generic/platform=iOS" \
      -configuration Release \
      -archivePath ./build/TinPlayer.xcarchive \
      CODE_SIGNING_ALLOWED=NO

- name: Find App from Archive
  run: |
    cd ${{ env.PROJ_ROOT }}

    echo "🔍 从 archive 查找 .app"

    APP_PATH=$(find ./build/TinPlayer.xcarchive -name "*.app" | head -n 1)

    if [ -z "$APP_PATH" ]; then
      echo "❌ archive 中仍然没有 .app"
      exit 1
    fi

    echo "✅ 找到 .app: $APP_PATH"
    echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
