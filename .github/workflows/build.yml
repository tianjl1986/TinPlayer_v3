name: TinPlayer Final Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive
          
          echo "🚀 Building TinPlayer..."
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          echo "📦 Assembling Bundle..."
          mkdir -p Payload/TinPlayer.app
          
          # 1. 抓取可执行文件
          BINARY_PATH=$(find ./TinPlayer.xcarchive/Products -type f -perm +111 ! -name "*.plist" ! -name "*.sh" | head -n 1)
          cp "$BINARY_PATH" Payload/TinPlayer.app/TinPlayer
          chmod +x Payload/TinPlayer.app/TinPlayer
          
          # 2. 抓取资源文件 (强制全目录搜索)
          echo "🔍 Looking for Assets..."
          # 在整个工作空间搜索编译后的 Assets.car
          ASSETS_CAR=$(find . -name "Assets.car" | head -n 1)
          if [ -z "$ASSETS_CAR" ]; then
             # 如果没找到，去 DerivedData 深度搜索
             ASSETS_CAR=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "Assets.car" -path "*/TinPlayer*/*" | head -n 1)
          fi
          
          if [ -n "$ASSETS_CAR" ]; then
            echo "✅ Found Assets.car: $ASSETS_CAR"
            cp "$ASSETS_CAR" Payload/TinPlayer.app/
          fi
          
          # 抓取所有 bundle (Swift 资源包)
          find . -name "*.bundle" -type d -exec cp -rv {}/. Payload/TinPlayer.app/ \; || true

          # 3. 补全 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>13</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>17.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
          </dict>
          </plist>
          EOF
          
          # 4. 压缩
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Done! IPA Created."

      # 新增：直接把 IPA 上传到 Actions 下载区，防止 Release 抽风
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
