name: TinPlayer Final Integrity Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive
          
          echo "🚀 Compiling..."
          xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

          echo "📦 Constructing Bundle..."
          mkdir -p Payload/TinPlayer.app
          
          # 1. 抓取二进制
          BINARY_SOURCE=$(find ./TinPlayer.xcarchive/Products -type f -perm +111 | head -n 1)
          cp "$BINARY_SOURCE" Payload/TinPlayer.app/TinPlayer
          chmod +x Payload/TinPlayer.app/TinPlayer

          # 2. 【核心修复】强制编译并验证资源文件
          echo "🎨 Compiling Assets.xcassets..."
          # 我们先寻找图标，确保编译能找到它
          xcrun actool Assets.xcassets \
            --compile Payload/TinPlayer.app \
            --platform iphoneos \
            --minimum-deployment-target 17.0 \
            --app-icon AppIcon \
            --output-partial-info-plist partial.plist

          # 验证 Assets.car 是否真的生成了
          if [ ! -f "Payload/TinPlayer.app/Assets.car" ]; then
            echo "⚠️ Assets.car missing! Trying fallback search..."
            # 有时 actool 会把产物放在临时文件夹
            FALLBACK_CAR=$(find . -name "Assets.car" | head -n 1)
            [ -n "$FALLBACK_CAR" ] && cp "$FALLBACK_CAR" Payload/TinPlayer.app/
          fi

          # 3. 生成 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist
