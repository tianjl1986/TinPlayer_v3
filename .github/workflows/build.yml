name: TinPlayer Bruteforce Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Prepare Environment
        run: |
          set -e
          mkdir -p TinPlayer.swiftpm
          cp -R ./* TinPlayer.swiftpm/ || true
          cd TinPlayer.swiftpm
          # 恢复为 executableTarget
          sed -i '' 's/\.target(/.executableTarget(/g' Package.swift
          sed -i '' '/appIcon: .asset("AppIcon"),/d' Package.swift

      - name: Archive Project
        run: |
          set -e
          cd TinPlayer.swiftpm
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ../TinPlayer.xcarchive \
            -derivedDataPath ../DerivedData \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 🚀 暴力灌顶打包 (Bruteforce Packaging)
        run: |
          set -e
          APP_PATH=$(find ./TinPlayer.xcarchive -name "*.app" -type d | head -n 1)
          echo "🎯 初始 App 路径: $APP_PATH"
          
          mkdir -p Payload
          cp -RL "$APP_PATH" Payload/
          
          APP_DIR_NAME=$(basename "$APP_PATH")
          INFOPLIST="Payload/$APP_DIR_NAME/Info.plist"
          BIN_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$INFOPLIST" 2>/dev/null || echo "TinPlayer")
          
          echo "🔍 正在缓存中搜寻真正的二进制灵魂..."
          # 在 DerivedData 中寻找编译产出的真正大文件
          REAL_BIN=$(find ./DerivedData -type f -perm +111 -size +1M | grep -v "xctest" | head -n 1)
          
          if [ -n "$REAL_BIN" ]; then
             echo "🔥 抓到了！真正的二进制在: $REAL_BIN ($(du -h "$REAL_BIN" | cut -f1))"
             echo "⚡ 正在执行灵魂灌顶..."
             cp -f "$REAL_BIN" "Payload/$APP_DIR_NAME/$BIN_NAME"
          else
             echo "⚠️ 没找到超过 1MB 的二进制，尝试寻找任何名为 AppModule 的可执行文件..."
             ALT_BIN=$(find ./DerivedData -name "AppModule" -type f -perm +111 | head -n 1)
             if [ -n "$ALT_BIN" ]; then
                cp -f "$ALT_BIN" "Payload/$APP_DIR_NAME/$BIN_NAME"
             fi
          fi
          
          chmod +x "Payload/$APP_DIR_NAME/$BIN_NAME"
          
          # 写入权限描述（必填）
          /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string 'Play music'" "$INFOPLIST" 2>/dev/null || true
          
          zip -q -r TinPlayer.ipa Payload
          echo "✅ 暴力打包完成 - IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-Bruteforce-Success
          path: TinPlayer.ipa
