name: TinPlayer Final Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          
          echo "🚀 Preparing project structure..."
          ORIGINAL_FOLDER=$(basename $(pwd))
          rm -f Sources/SkeuoPlayerApp.swift
          
          cd ..
          mv "$ORIGINAL_FOLDER" TinPlayer.swiftpm
          cd TinPlayer.swiftpm
          
          rm -rf Payload TinPlayer.ipa TinPlayer.xcarchive DerivedData
          
          echo "🚀 Building TinPlayer.swiftpm..."
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild archive \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -archivePath ./TinPlayer.xcarchive \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO
          
          echo "📦 Assembling Bundle..."
          APP_BUNDLE="./TinPlayer.xcarchive/Products/Applications/TinPlayer.app"
          
          if [ -d "$APP_BUNDLE" ]; then
              echo "✅ Found App Bundle"
              mkdir -p Payload
              cp -R "$APP_BUNDLE" Payload/
          else
              echo "❌ ERROR: Cannot find TinPlayer.app!"
              exit 1
          fi
          
          echo "🎨 Processing Icon (Removing Alpha Channel)..."
          ICON_SOURCE="Sources/Assets.xcassets/AppIcon.appiconset/icon.png"
          TARGET_DIR="Payload/TinPlayer.app"
          
          # 关键点：强制去除 Alpha 通道（转为不透明）并缩放
          # 先转为无透明的 TIFF 再转回 PNG，这是最稳妥的去透明方法
          sips -s format tiff "$ICON_SOURCE" --out icon_temp.tiff
          sips -s format png icon_temp.tiff --out icon_clean.png
          
          # 制作各个倍率的图标
          sips -z 120 120 icon_clean.png --out "$TARGET_DIR/AppIcon60x60@2x.png"
          sips -z 180 180 icon_clean.png --out "$TARGET_DIR/AppIcon60x60@3x.png"
          sips -z 1024 1024 icon_clean.png --out "$TARGET_DIR/AppIcon1024x1024.png"
          
          echo "🛠 Patching Info.plist..."
          python3 - << 'EOF'
          import plistlib

          plist_path = 'Payload/TinPlayer.app/Info.plist'
          with open(plist_path, 'rb') as f:
              plist = plistlib.load(f)

          # 强制更新核心元数据
          plist['CFBundleIdentifier'] = 'com.skeuo.tinplayer'
          plist['CFBundleShortVersionString'] = '1.3.0'
          plist['CFBundleVersion'] = '50'
          plist['MinimumOSVersion'] = '16.0'
          
          # 冗余图标配置 (覆盖所有可能的识别路径)
          icon_list = ['AppIcon60x60']
          plist['CFBundleIconFiles'] = icon_list
          plist['CFBundleIcons'] = {
              'CFBundlePrimaryIcon': {
                  'CFBundleIconFiles': icon_list,
                  'CFBundleIconName': 'AppIcon'
              }
          }
          
          # 权限补丁
          plist['NSAppleMusicUsageDescription'] = '我们需要访问您的媒体库以播放本地音乐。'
          plist['NSPhotoLibraryUsageDescription'] = '我们需要访问相册以保存或读取封面图片。'
          plist['NSLocalNetworkUsageDescription'] = '我们需要访问本地网络以获取歌词和元数据。'
          plist['UIBackgroundModes'] = ['audio']

          with open(plist_path, 'wb') as f:
              plistlib.dump(plist, f)
          EOF
          
          echo "📊 Final Payload size: $(du -sh Payload | cut -f1)"
          zip -q -r TinPlayer.ipa Payload
          
          cd ..
          mv TinPlayer.swiftpm "$ORIGINAL_FOLDER"
          echo "✅ Done! IPA Created."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
