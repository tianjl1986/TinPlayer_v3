name: TinPlayer Deep Scan Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and Package
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          
          echo "🚀 Building with standard 'build' command (to generate real .app)..."
          # 使用 build 而不是 archive，并指定导出路径
          xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

          echo "🔍 Hunting for the real .app bundle..."
          # 在 DerivedData 里面深度搜寻真正的 .app 文件夹
          REAL_APP=$(find ./DerivedData -name "TinPlayer.app" -type d -path "*/Release-iphoneos/*" | head -n 1)

          if [ -n "$REAL_APP" ]; then
            echo "✅ Found Real App Bundle: $REAL_APP"
            # 检查体积
            du -sh "$REAL_APP"
            
            mkdir -p Payload
            cp -R "$REAL_APP" Payload/
            
            # 补丁：获取真实的二进制文件名并赋予权限
            # 很多时候在 SwiftPM 项目里，它叫 "AppModule" 而不是 "TinPlayer"
            INFOPLIST="Payload/$(basename "$REAL_APP")/Info.plist"
            EXE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$INFOPLIST")
            echo "🚀 Executable name is: $EXE_NAME"
            chmod +x "Payload/$(basename "$REAL_APP")/$EXE_NAME"
          else
            echo "❌ ERROR: Real .app bundle not found in DerivedData!"
            find ./DerivedData -maxdepth 6 -type d
            exit 1
          fi
          
          # 打包
          zip -q -r TinPlayer.ipa Payload
          echo "✅ Done! Final IPA created."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-IPA
          path: TinPlayer.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.0-final-${{ github.run_number }}"
          name: "Tin Player Release #${{ github.run_number }}"
          files: TinPlayer.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
