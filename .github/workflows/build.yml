name: TinPlayer Bruteforce Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: |
          set -e
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app

          echo "📦 正在执行全量打包策略..."
          
          # 1. 定位编译产物目录
          PRODUCT_DIR=$(find ./DerivedData -name "Release-iphoneos" -type d | head -n 1)
          echo "✅ 产物目录: $PRODUCT_DIR"
          
          # 2. 将该目录下所有文件拷贝进 .app (包括可能的动态库和资源)
          cp -R "$PRODUCT_DIR/" Payload/TinPlayer.app/
          
          # 3. 寻找并确保主执行文件名为 TinPlayer
          # 如果目录下没有叫 TinPlayer 的文件，找体积最大的那个重命名
          if [ ! -f "Payload/TinPlayer.app/TinPlayer" ]; then
             echo "⚠️ 未发现 TinPlayer 二进制，寻找替代品..."
             # 找体积最大的可执行文件
             BIGGEST=$(find Payload/TinPlayer.app -type f -perm +111 | xargs du -s | sort -rn | head -n 1 | awk '{print $2}')
             if [ -n "$BIGGEST" ]; then
                mv "$BIGGEST" Payload/TinPlayer.app/TinPlayer
             fi
          fi
          
          chmod +x Payload/TinPlayer.app/TinPlayer
          
          # 4. 强制覆盖/注入正确的 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.
