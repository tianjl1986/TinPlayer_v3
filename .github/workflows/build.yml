name: TinPlayer Deep Diagnostic Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Diagnostic - Print Project Structure
        run: |
          echo "📂 项目结构库:"
          ls -R
          echo "📄 Package.swift 内容:"
          cat Package.swift || echo "未找到 Package.swift"

      - name: Build with No Stripping
        run: |
          set -e
          # 禁用所有代码裁剪和压缩，强制保留所有符号
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            COPY_PHASE_STRIP=NO

      - name: Assembly & Deep Scan
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload/TinPlayer.app/Frameworks

          echo "🔍 寻找所有大于 500KB 的产物..."
          find ./DerivedData -type f -size +500k ! -path "*/.git/*"
          
          echo "🔍 寻找所有的 .swiftmodule (确定代码在哪)..."
          find ./DerivedData -name "*.swiftmodule"

          # 抓取主程序
          REAL_BINARY=$(find ./DerivedData/Build/Products -name "TinPlayer" -type f ! -name "*.*" -perm +111 | head -n 1)
          if [ -n "$REAL_BINARY" ]; then
             cp "$REAL_BINARY" Payload/TinPlayer.app/TinPlayer
             chmod +x Payload/TinPlayer.app/TinPlayer
          fi

          # 抓取所有动态库
          find ./DerivedData/Build/Products -name "*.framework" -exec cp -R {} Payload/TinPlayer.app/Frameworks/ \; 2>/dev/null || true
          
          # 注入基础 Info.plist
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string>TinPlayer</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.3.0</string>
              <key>CFBundleVersion</key><string>29</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchScreen</key><dict/>
              <key>MinimumOSVersion</key><string>16.0</string>
              <key>UIDeviceFamily</key><array><integer>1</integer></array>
              <key>UIFileSharingEnabled</key><true/>
              <key>NSAppleMusicUsageDescription</key><string>扫描本地音乐</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
          </dict>
          </plist>
          EOF

          zip -q -r TinPlayer.ipa Payload
          echo "✅ 最终 IPA 大小: $(du -sh TinPlayer.ipa | cut -f1)"

      - name: Upload Artifact
        uses: upload-artifact@v4
        with:
          name: TinPlayer-v1.3.0-Diagnostic
          path: TinPlayer.ipa
