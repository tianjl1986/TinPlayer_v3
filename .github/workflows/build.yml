name: TinPlayer Build Final

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Find Project Root
        run: |
          SOURCES_DIR=$(find . -name "Sources" -type d | head -n 1)
          PROJ_ROOT=$(dirname "$SOURCES_DIR")
          echo "PROJ_ROOT=$PROJ_ROOT" >> $GITHUB_ENV

      - name: Generate Package.swift
        run: |
          cd ${{ env.PROJ_ROOT }}

          rm -f Package.swift
          cat <<EOF > Package.swift
          // swift-tools-version: 5.8
          import PackageDescription
          import AppleProductTypes

          let package = Package(
              name: "TinPlayer",
              platforms: [.iOS(.v16)],
              products: [
                  .iOSApplication(
                      name: "TinPlayer",
                      targets: ["AppModule"],
                      bundleIdentifier: "com.skeuo.tinplayer",
                      displayVersion: "1.3.0",
                      bundleVersion: "12",
                      appIcon: .asset("AppIcon"),
                      accentColor: .presetColor(.indigo),
                      supportedDeviceFamilies: [.phone],
                      supportedInterfaceOrientations: [.portrait],
                      capabilities: [
                          .mediaLibrary(purposeString: "访问本地音乐"),
                          .outgoingNetworkConnections()
                      ]
                  )
              ],
              targets: [
                  .executableTarget(
                      name: "AppModule",
                      path: "Sources"
                  )
              ]
          )
          EOF

      - name: Build App
        run: |
          cd ${{ env.PROJ_ROOT }}

          xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath ./build_data \
            CODE_SIGNING_ALLOWED=NO

      - name: Find .app
        run: |
          cd ${{ env.PROJ_ROOT }}

          echo "🔍 查找 .app 文件..."

          APP_PATH=$(find ./build_data -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ 没找到 .app"
            exit 1
          fi

          echo "✅ 找到 .app: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create IPA
        run: |
          cd ${{ env.PROJ_ROOT }}

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          zip -r TinPlayer.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TinPlayer-IPA
          path: ${{ env.PROJ_ROOT }}/TinPlayer.ipa
