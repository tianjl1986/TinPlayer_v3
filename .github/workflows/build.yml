name: TinPlayer Official Bundle Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: |
          set -e
          # 使用强制方案生成 Bundle
          /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild build \
            -scheme "TinPlayer" \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Assembly IPA
        run: |
          set -e
          rm -rf Payload TinPlayer.ipa
          mkdir -p Payload

          echo "🔍 正在寻找官方生成的 .app 包..."
          # 优先寻找 Build/Products 下真正的 .app 目录
          REAL_APP=$(find ./DerivedData/Build/Products -name "*.app" -type d | head -n 1)
          
          if [ -n "$REAL_APP" ]; then
             echo "✅ 找到官方包: $REAL_APP"
             cp -R "$REAL_APP" Payload/TinPlayer.app
          else
             echo "⚠️ 未找到 .app 包，执行紧急备选方案..."
             mkdir -p Payload/TinPlayer.app
             PRODUCT_DIR=$(find ./DerivedData/Build/Products -name "Release-iphoneos" -type d | head -n 1)
             cp -R "$PRODUCT_DIR/" Payload/TinPlayer.app/
          fi

          # 确保二进制文件存在且正确
          # 寻找 Payload/TinPlayer.app 目录下真正的 Mach-O 执行文件
          echo "🔍 校验二进制文件类型..."
          EXECUTABLE=$(find Payload/TinPlayer.app -maxdepth 2 -type f ! -name "*.*" | xargs file | grep "Mach-O 64-bit executable" | cut -d: -f1 | head -n 1)
          
          if [ -n "$EXECUTABLE" ]; then
             echo "✅ 锁定二进制: $EXECUTABLE"
             mv "$EXECUTABLE" Payload/TinPlayer.app/TinPlayer
             chmod +x Payload/TinPlayer.app/TinPlayer
          else
             echo "❌ 严重错误: 没找到任何有效的 Mach-O 二进制文件！"
             exit 1
          fi

          # 注入/修正 Info.plist
          # 注意：CFBundleExecutable 必须和二进制文件名完全一致
          cat << 'EOF' > Payload/TinPlayer.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TinPlayer</string>
              <key>CFBundleIdentifier</key><string>com.skeuo.tinplayer</string>
              <key>CFBundleName</key><string
